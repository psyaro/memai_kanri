<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d6fb0"/>
      <stop offset="100%" stop-color="#7b5ea7"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 折れ線グラフ（体調の波） -->
  <polyline
    points="80,340 160,260 240,300 320,180 400,240 480,160"
    fill="none"
    stroke="rgba(255,255,255,0.35)"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- 折れ線グラフ（メイン白） -->
  <polyline
    points="80,340 160,260 240,300 320,180 400,240 480,160"
    fill="none"
    stroke="white"
    stroke-width="20"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- データ点 -->
  <circle cx="160" cy="260" r="16" fill="white"/>
  <circle cx="240" cy="300" r="16" fill="white"/>
  <circle cx="320" cy="180" r="22" fill="white"/>
  <circle cx="400" cy="240" r="16" fill="white"/>
  <!-- ハートビート強調点（最高点） -->
  <circle cx="320" cy="180" r="14" fill="#7b5ea7"/>
</svg>
