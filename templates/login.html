<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SymptoPort — ログイン</title>
  <link rel="stylesheet" href="{{ static_v('style.css') }}">
  {% include '_pwa_head.html' %}
  <!-- Cloudflare Turnstile Script -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body class="login-page">
  <div class="login-card">
    <h1>SymptoPort</h1>
    {% if error %}
      <p class="error-msg">{{ error }}</p>
    {% endif %}
    <form method="post" action="/login">
      <label>ユーザー名
        <input type="text" name="username" autocomplete="username" required autofocus>
      </label>
      <label>パスワード
        <input type="password" name="password" autocomplete="current-password" required>
      </label>

      <!-- Turnstile Widget -->
      {% if turnstile_site_key %}
      <div style="margin-bottom: 16px; display: flex; justify-content: center;">
        <div class="cf-turnstile" data-sitekey="{{ turnstile_site_key }}"></div>
      </div>
      {% endif %}

      <button type="submit">ログイン</button>
    </form>
    <div style="margin-top: 20px; text-align: center; display: flex; flex-direction: column; gap: 8px;">
      <a href="/register" style="font-size: 0.85rem; color: var(--primary); text-decoration: none;">新規アカウント登録はこちら</a>
      <a href="/help" style="font-size: 0.8rem; color: var(--muted); text-decoration: none;">アプリの使い方・解説ガイド</a>
    </div>
  </div>
</body>
</html>
