  <!-- OGP / SNS 共有 -->
  <meta property="og:site_name" content="{{ og_site_name }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ base_url }}{{ request.url.path }}">
  <meta property="og:title" content="{{ og_title }}">
  <meta property="og:description" content="{{ og_description }}">
  <meta property="og:image" content="{{ og_image_app }}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="{{ og_locale }}">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ og_title }}">
  <meta name="twitter:description" content="{{ og_description }}">
  <meta name="twitter:image" content="{{ og_image_app }}">
  <!-- PWA -->
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#4a90d9">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SymptoPort">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/static/icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="144x144" href="/static/icons/icon-144.png">
  <link rel="icon" type="image/svg+xml" href="/static/icons/icon.svg">
  <script src="/static/pwa.js"></script>
