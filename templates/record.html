<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SymptoPort</title>
  <link rel="stylesheet" href="{{ static_v('style.css') }}">
  {% include '_pwa_head.html' %}
</head>
<body>
  <header>
    <h1>SymptoPort</h1>
    <nav class="header-nav">
      <a href="/print">印刷</a>
      <a href="/help">使い方</a>
      <a href="/settings">設定</a>
      <button data-pwa-install onclick="triggerInstall()" class="install-nav-btn" style="display:none">📲 インストール</button>
      <a href="/logout">ログアウト</a>
    </nav>
  </header>

  <main>
    <div class="date-row">
      <button type="button" id="btn-prev" class="nav-btn">&#8592; 昨日</button>
      <input type="date" id="date-input" value="{{ date }}">
      <button type="button" id="btn-next" class="nav-btn">翌日 &#8594;</button>
    </div>

    <div id="save-msg" class="save-msg" hidden></div>

    <form id="record-form">
      {% for s in symptoms %}
      <section class="symptom-section">
        <h2>{{ s.label }}</h2>
        <div class="timepoint-grid">
          {% set tps = ["overall"] if not s.use_timepoints else timepoints %}
          {% for tp in tps %}
          <div class="tp-block">
            <div class="tp-label">{{ timepoint_labels[tp] }}</div>
            <div class="score-buttons" data-symptom="{{ s.name }}" data-timepoint="{{ tp }}" data-reverse="{{ 1 if s.is_reverse else 0 }}">
              <button type="button" class="score-btn" data-score="none">なし</button>
              {% for i in range(6) %}
              <button type="button" class="score-btn" data-score="{{ i }}">{{ i }}</button>
              {% endfor %}
            </div>
          </div>
          {% endfor %}
        </div>
      </section>
      {% endfor %}

      <section class="notes-section">
        <h2>備考</h2>
        <textarea id="note-input" placeholder="自由記入（薬、イベント、体の変化など）">{{ note }}</textarea>
      </section>

      <div class="save-row">
        <button type="button" id="btn-clear" class="clear-btn">この日をクリア</button>
      </div>
    </form>
  </main>

  <script>
    const EXISTING = {{ existing | safe }};
    const EXISTING_NOTE = {{ note | tojson }};
  </script>
  <script src="{{ static_v('app.js') }}"></script>
</body>
</html>
