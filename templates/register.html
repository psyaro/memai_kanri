<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>体調記録 — 新規登録</title>
  <link rel="stylesheet" href="{{ static_v('style.css') }}">
  <!-- Cloudflare Turnstile Script -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body class="login-page">
  <div class="login-card">
    <h1>新規アカウント登録</h1>
    {% if error %}
      <p class="error-msg">{{ error }}</p>
    {% endif %}
    <form method="post" action="/register">
      <label>ユーザー名（3〜20文字の半角英数字）
        <input type="text" name="username" autocomplete="username" pattern="^[a-zA-Z0-9_]{3,20}$" title="3〜20文字の半角英数字（アンダースコア含む）" required autofocus>
      </label>
      <label>パスワード（8文字以上）
        <input type="password" name="password" autocomplete="new-password" minlength="8" required>
      </label>
      <label>パスワード（確認）
        <input type="password" name="password_confirm" autocomplete="new-password" minlength="8" required>
      </label>

      <!-- 症状選択 -->
      <div class="symptom-selection">
        <p class="symptom-selection-title">どのような症状を記録しますか？<br><small>※後から「設定」で自由に変更できます</small></p>
        <div class="symptom-checkboxes">
          {% for symptom in default_symptoms %}
            <label class="symptom-checkbox-label">
              <input type="checkbox" name="symptoms" value="{{ symptom[0] }}" 
                {% if symptom[0] in ['sleep', 'mental', 'fatigue'] %}checked{% endif %}>
              <span class="symptom-checkbox-text">{{ symptom[1] }}</span>
            </label>
          {% endfor %}
        </div>
      </div>
      
      <!-- Turnstile Widget -->
      {% if turnstile_site_key %}
      <div style="margin-bottom: 16px; display: flex; justify-content: center;">
        <div class="cf-turnstile" data-sitekey="{{ turnstile_site_key }}"></div>
      </div>
      {% endif %}

      <button type="submit">アカウント作成 & ログイン</button>
    </form>
    <div style="margin-top: 20px; text-align: center;">
      <a href="/login" style="font-size: 0.85rem; color: var(--primary); text-decoration: none;">すでにアカウントをお持ちの方はこちら</a>
    </div>
  </div>
</body>
</html>
