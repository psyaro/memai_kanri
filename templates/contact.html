<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ — SymptoPort</title>
  <link rel="stylesheet" href="{{ static_v('style.css') }}">
  {% include '_pwa_head.html' %}
  <style>
    .contact-wrap {
      max-width: 600px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }
    .contact-wrap h1 {
      font-size: 1.6rem;
      margin-bottom: 8px;
    }
    .contact-wrap .subtitle {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 32px;
      line-height: 1.7;
    }
    .contact-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px 28px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 20px;
    }
    .form-group label {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--muted);
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 140px;
    }
    .submit-btn {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .submit-btn:hover { background: var(--primary-dark); }
    .notice {
      background: #eaf4ff;
      border-left: 4px solid var(--primary);
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 0.87rem;
      color: var(--text);
      margin-bottom: 24px;
      line-height: 1.65;
    }
    .success-msg {
      text-align: center;
      padding: 40px 20px;
      display: none;
    }
    .success-msg .icon { font-size: 3rem; margin-bottom: 12px; }
    .success-msg p { color: var(--muted); font-size: 0.95rem; }
    .back-link {
      display: inline-block;
      margin-top: 24px;
      font-size: 0.9rem;
      color: var(--primary);
    }
  </style>
</head>
<body>
<div class="contact-wrap">
  <h1>お問い合わせ</h1>
  <p class="subtitle">
    バグ報告・機能のご要望・アカウント削除依頼・プライバシーに関するご質問など、お気軽にご連絡ください。<br>
    通常 2〜5 営業日以内にご返信します。
  </p>

  <div class="contact-card">
    <div class="notice">
      ⚠️ 本サービスは医療サポートを行いません。症状に関するご相談は医療機関にご相談ください。
    </div>

    <form id="contactForm">
      <div class="form-group">
        <label for="category">お問い合わせ種別</label>
        <select id="category" name="category" required>
          <option value="">選択してください</option>
          <option value="bug">バグ報告</option>
          <option value="feature">機能のご要望</option>
          <option value="account">アカウントについて（削除など）</option>
          <option value="privacy">プライバシーに関する質問</option>
          <option value="other">その他</option>
        </select>
      </div>

      <div class="form-group">
        <label for="email">返信先メールアドレス</label>
        <input type="email" id="email" name="email" placeholder="example@mail.com" required>
      </div>

      <div class="form-group">
        <label for="body">お問い合わせ内容</label>
        <textarea id="body" name="body" placeholder="できるだけ詳しくご記入ください..." required></textarea>
      </div>

      <button type="submit" class="submit-btn">送信する</button>
    </form>

    <div class="success-msg" id="successMsg">
      <div class="icon">✅</div>
      <h2 style="margin-bottom:8px;">送信しました</h2>
      <p>お問い合わせを受け付けました。<br>返信までしばらくお待ちください。</p>
    </div>
  </div>

  <a href="/" class="back-link">← トップに戻る</a>
</div>

<script>
// 現時点ではフォーム送信機能は未実装（バックエンド連携が必要）
// 送信ボタンを押したらサクセス表示に切り替えるデモ動作
document.getElementById('contactForm').addEventListener('submit', function(e) {
  e.preventDefault();
  this.style.display = 'none';
  document.getElementById('successMsg').style.display = 'block';
});
</script>
</body>
</html>
